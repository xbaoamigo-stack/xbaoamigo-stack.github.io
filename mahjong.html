<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四川麻將 - 消消樂</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        h1 { font-size: 1.8em; margin-bottom: 10px; }
        .info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            gap: 5px;
            justify-content: center;
            margin: 20px auto;
        }
        .tile {
            width: 50px;
            height: 65px;
            background: linear-gradient(145deg, #f5f5f5, #e0e0e0);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            color: #333;
            user-select: none;
        }
        .tile:hover:not(.matched) {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }
        .tile.matched {
            background: #4ade80;
            opacity: 0.5;
            cursor: default;
            transform: scale(0.9);
        }
        .tile.selected {
            box-shadow: 0 0 0 3px #fbbf24, 0 5px 15px rgba(251,191,36,0.4);
            transform: translateY(-3px);
        }
        .tile.hint {
            animation: pulse 0.5s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            from { box-shadow: 0 0 0 3px #ef4444, 0 0 10px rgba(239,68,68,0.3); }
            to { box-shadow: 0 0 0 5px #ef4444, 0 0 20px rgba(239,68,68,0.5); }
        }
        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        button {
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            background: #6366f1;
            color: #fff;
        }
        button:hover { transform: translateY(-2px); }
        .btn-secondary { background: #4b5563; }
        #result {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px 60px;
            border-radius: 20px;
            display: none;
            z-index: 100;
        }
        #result h2 { font-size: 2em; margin-bottom: 15px; }
        #result p { color: #a0a0a0; margin-bottom: 20px; }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 99;
        }
        .tiles-left { color: #fbbf24; }
    </style>
</head>
<body>
    <h1>🀄 四川麻將 - 消消樂</h1>
    <div class="info">
        <span>剩余: <span id="left" class="tiles-left">48</span></span>
        <span>配對: <span id="pairs">0</span></span>
    </div>
    <div id="grid"></div>
    <div class="btn-group">
        <button onclick="shuffle()">重新洗牌</button>
        <button class="btn-secondary" onclick="init()">新遊戲</button>
        <button class="btn-secondary" onclick="location.href='index.html'">回首頁</button>
    </div>
    <div class="overlay" id="overlay"></div>
    <div id="result">
        <h2>🎉 恭喜過關！</h2>
        <p id="resultText"></p>
        <button onclick="init()">再玩一次</button>
    </div>

    <script>
        const TILES = ['🀄','🀅','🀇','🀈','🀉','🀊','🀋','🀌','🀍','🀎','🀏','🀐','🀑','🀒','🀓','🀔','🀕','🀙','🀚','🀛','🀜','🀝','🀞','🀟'];
        let tiles = [];
        let selected = null;
        let matched = 0;
        let hintsUsed = 0;

        function init() {
            matched = 0;
            hintsUsed = 0;
            selected = null;
            document.getElementById('pairs').textContent = '0';
            // Create pairs
            let pool = [];
            for (let i = 0; i < 24; i++) {
                pool.push(TILES[i], TILES[i]);
            }
            // Shuffle
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            tiles = pool;
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            tiles.forEach((tile, idx) => {
                const el = document.createElement('div');
                el.className = 'tile';
                el.textContent = tile;
                el.dataset.idx = idx;
                if (tile === null) {
                    el.classList.add('matched');
                    el.textContent = '';
                }
                el.addEventListener('click', () => handleClick(idx));
                grid.appendChild(el);
            });
            document.getElementById('left').textContent = tiles.filter(t => t !== null).length;
        }

        function handleClick(idx) {
            if (tiles[idx] === null) return;
            const tileEls = document.querySelectorAll('.tile');
            tileEls.forEach(el => el.classList.remove('selected', 'hint'));
            
            if (selected === idx) {
                selected = null;
                return;
            }
            
            if (selected === null) {
                selected = idx;
                tileEls[idx].classList.add('selected');
            } else {
                if (tiles[selected] === tiles[idx]) {
                    // Match!
                    tiles[selected] = null;
                    tiles[idx] = null;
                    matched++;
                    document.getElementById('pairs').textContent = matched;
                    selected = null;
                    render();
                    if (tiles.every(t => t === null)) {
                        setTimeout(showResult, 300);
                    }
                } else {
                    // No match
                    tileEls[selected].classList.remove('selected');
                    selected = idx;
                    tileEls[idx].classList.add('selected');
                }
            }
        }

        function shuffle() {
            let remaining = tiles.map((t, i) => t !== null ? { tile: t, idx: i } : null).filter(x => x);
            for (let i = remaining.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
            }
            remaining.forEach((item, pos) => {
                tiles[item.idx] = item.tile;
            });
            selected = null;
            render();
        }

        function showResult() {
            document.getElementById('resultText').textContent = `配對 ${matched} 次`;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('result').style.display = 'block';
        }

        init();
    </script>
</body>
</html>
