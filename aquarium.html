<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐠 小蝦米水族箱</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a1628; height: 100vh; overflow: hidden; }
  #aquarium {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(180deg, #0d4f7a 0%, #0a2a4a 35%, #061a30 70%, #030f1e 100%);
    overflow: hidden;
  }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #ui { position: absolute; bottom: 16px; right: 16px; display: flex; gap: 10px; z-index: 10; }
  #ui button {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.85);
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    backdrop-filter: blur(6px);
    transition: background 0.2s;
  }
  #ui button:hover { background: rgba(255,255,255,0.25); }
  #hint {
    position: absolute; bottom: 18px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3); font-size: 12px;
    pointer-events: none; z-index: 10;
  }
  #title {
    position: absolute; top: 16px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.2); font-size: 13px;
    letter-spacing: 3px; z-index: 10; pointer-events: none;
  }
</style>
</head>
<body>
<div id="aquarium">
  <canvas id="canvas"></canvas>

  <div id="ui">

  </div>
  <div id="hint">點擊水中任意處餵食</div>
</div>

const loadedImages = {};
let imagesReady = false;

function loadAllImages() {
  let loaded = 0;
  fishKeys.forEach(name => {
    if (!fishData[name]) { loaded++; return; }
    const img = new Image();
    img.onload = img.onerror = () => {
      if (loadedImages[name] !== 'failed') {
        loadedImages[name] = img;
      }
      loaded++;
      if (loaded >= fishKeys.length) {
        imagesReady = true;
      }
    };
    img.src = fishData[name];
    // Mark as loading
    loadedImages[name] = 'loading';
  });
  // Fallback: assume ready after 5s even if not all loaded
  setTimeout(() => { imagesReady = true; }, 5000);
}

// ─── Scene Elements ─────────────────────────────────────────────────────────
let bubbles = [], planktons = [], fishes = [], pellets = [];

// Bubbles
class Bubble {
  constructor(initY) { this._reset(); if (initY !== undefined) this.y = initY; }
  _reset() {
    this.x = rand(0, W); this.y = H + rand(5, 60);
    this.r = rand(2, 6); this.speed = rand(0.3, 0.9);
    this.wobble = rand(0, Math.PI * 2); this.wobbleSpeed = rand(0.01, 0.03);
    this.alpha = rand(0.12, 0.35);
  }
  update() {
    this.y -= this.speed; this.wobble += this.wobbleSpeed;
    this.x += Math.sin(this.wobble) * 0.4;
    if (this.y < -20) this._reset();
  }
  draw() {
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,235,255,${this.alpha})`; ctx.fill();
    ctx.beginPath(); ctx.arc(this.x-this.r*0.3, this.y-this.r*0.3, this.r*0.35, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fill();
  }
}

// Plankton
class Plankton {
  constructor() { this.reset(); }
  reset() {
    this.x = rand(0, W); this.y = rand(0, H); this.r = rand(0.5, 1.5);
    this.alpha = rand(0.05, 0.18); this.speedX = rand(-0.12, 0.12);
    this.speedY = rand(-0.06, 0.06); this.phase = rand(0, Math.PI * 2);
  }
  update() {
    this.phase += 0.02;
    this.x += this.speedX + Math.sin(this.phase) * 0.15;
    this.y += this.speedY;
    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
  }
  draw() {
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,230,200,${this.alpha})`; ctx.fill();
  }
}

// Light rays
let rays = [];
function initRays() {
  rays = Array.from({length: 7}, () => ({
    x: W*0.05 + rand(0, W*0.9), width: rand(40,100),
    alpha: rand(0.025, 0.065), speed: rand(0.0002, 0.0006), phase: rand(0, Math.PI*2)
  }));
}

function drawRays() {
  rays.forEach(r => {
    r.phase += r.speed;
    const drift = Math.sin(r.phase) * 25;
    const grad = ctx.createLinearGradient(r.x+drift, 0, r.x+drift+r.width*1.5, H*0.55);
    grad.addColorStop(0, `rgba(160,225,255,${r.alpha})`);
    grad.addColorStop(1, 'rgba(160,225,255,0)');
    ctx.beginPath();
    ctx.moveTo(r.x+drift, 0);
    ctx.lineTo(r.x+drift+r.width*1.5, H*0.55);
    ctx.lineTo(r.x+drift+r.width*1.5+15, H*0.55);
    ctx.lineTo(r.x+drift+15, 0);
    ctx.fillStyle = grad; ctx.fill();
  });
}

// Seaweed
let seaweeds = [];
function initSeaweed() {
  seaweeds = [];
  const count = Math.max(4, Math.floor(W/110));
  for (let i = 0; i < count; i++) {
    seaweeds.push({
      baseX: 30 + (W-60)*(i/Math.max(count-1,1)) + rand(-25,25),
      height: rand(70,160), segments: Math.floor(rand(7,12)),
      phase: rand(0, Math.PI*2), speed: rand(0.007, 0.014),
      color: `hsl(${rand(95,160)},${rand(45,70)}%,${rand(22,38)}%)`,
      width: rand(4,8)
    });
  }
}

function drawSeaweed(sw) {
  ctx.beginPath(); ctx.moveTo(sw.baseX, H);
  let x = sw.baseX;
  for (let i = 1; i <= sw.segments; i++) {
    const t = i/sw.segments;
    const wave = Math.sin(time*sw.speed + sw.phase + t*3) * 14*t;
    x = sw.baseX + wave; ctx.lineTo(x, H-t*sw.height);
  }
  ctx.strokeStyle = sw.color; ctx.lineWidth = sw.width;
  ctx.lineCap = 'round'; ctx.stroke();
}

// Background decor
function drawDecor() {
  // Sand
  const sg = ctx.createLinearGradient(0, H*0.72, 0, H);
  sg.addColorStop(0, 'rgba(180,150,90,0)');
  sg.addColorStop(0.4, 'rgba(160,128,75,0.25)');
  sg.addColorStop(1, 'rgba(140,110,60,0.45)');
  ctx.fillStyle = sg; ctx.fillRect(0, H*0.70, W, H*0.30);

  // Rocks
  [{x:W*.08,w:75,h:28,c:'#4a3d2e'},{x:W*.25,w:55,h:22,c:'#3d3425'},
   {x:W*.70,w:95,h:35,c:'#4a3d2e'},{x:W*.85,w:50,h:24,c:'#3d3425'}].forEach(r => {
    ctx.beginPath();
    ctx.ellipse(r.x, H-12-r.h/2, r.w/2, r.h/2, 0, 0, Math.PI*2);
    ctx.fillStyle = r.c; ctx.fill();
  });

  // Corals
  [[W*.12,38,'#e8705a'],[W*.55,50,'#f4a460'],
   [W*.88,32,'#e06080'],[W*.40,28,'#ff9a7a']].forEach(([cx,ch,cc]) => {
    ctx.beginPath(); ctx.moveTo(cx-10, H-12);
    ctx.quadraticCurveTo(cx-12, H-12-ch, cx, H-12-ch-8);
    ctx.quadraticCurveTo(cx+12, H-12-ch, cx+10, H-12);
    ctx.fillStyle = cc; ctx.fill();
    for (let b=1; b<=3; b++) {
      ctx.beginPath(); ctx.moveTo(cx, H-12-ch*b/4);
      ctx.quadraticCurveTo(cx+7*b, H-12-ch*b/4-8, cx+4, H-12-ch*(b+1)/4-4);
      ctx.strokeStyle = cc; ctx.lineWidth = 2.5; ctx.stroke();
    }
  });
}

// ─── Pellet ─────────────────────────────────────────────────────────────────
class Pellet {
  constructor(x, y) {
    this.x=x; this.y=y; this.vy=-2; this.vx=rand(-0.5,0.5);
    this.r=3.5; this.alpha=1; this.eaten=false; this.age=0;
  }
  update() {
    this.age++; this.vy += 0.06; this.y += this.vy;
    this.x += this.vx + Math.sin(this.y*0.06)*0.25;
    if (this.y > H-25) { this.alpha -= 0.04; if (this.alpha <= 0) this.eaten = true; }
  }
  draw() {
    ctx.save(); ctx.globalAlpha = Math.max(0,this.alpha);
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = '#d4a830'; ctx.fill();
    ctx.beginPath(); ctx.arc(this.x-1, this.y-1.2, this.r*0.45, 0, Math.PI*2);
    ctx.fillStyle = '#ffe880'; ctx.fill();
    ctx.restore();
  }
}

// ─── Fish ────────────────────────────────────────────────────────────────────
const FISH_W = 320, FISH_H = 220;

class Fish {
  constructor(x, y, species) {
    this.x = x ?? rand(60, W-60);
    this.y = y ?? rand(H*0.12, H*0.68);
    this.species = species ?? fishKeys[Math.floor(Math.random()*fishKeys.length)];
    this.scale = rand(0.18, 0.32);
    this.speed = rand(0.35, 0.9);
    this.vx = (Math.random()>0.5 ? 1:-1)*this.speed;
    this.vy = 0; this.targetVy = 0;
    this.turnTimer = rand(60, 200);
    this.flip = this.vx < 0 ? -1 : 1;
    this.bobPhase = rand(0, Math.PI*2);
    this.tailPhase = rand(0, Math.PI*2);
    this.eating = false; this.eatTarget = null;
    this.w = FISH_W * this.scale; this.h = FISH_H * this.scale;
  }

  getImage() {
    const entry = loadedImages[this.species];
    return (entry && entry !== 'loading' && entry !== 'failed') ? entry : null;
  }

  update() {
    this.turnTimer--;
    this.bobPhase += 0.025;
    this.tailPhase += 0.18;

    if (this.eating && this.eatTarget && !this.eatTarget.eaten) {
      const dx=this.eatTarget.x-this.x, dy=this.eatTarget.y-this.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if (dist < 25) { this.eatTarget.eaten=true; this.eating=false; this.eatTarget=null; }
      else {
        this.vx=Math.sign(dx)*Math.min(Math.abs(dx)*0.04, this.speed*1.8);
        this.vy=dy*0.04; this.flip=dx>0?1:-1;
      }
    } else {
      if (this.turnTimer <= 0) {
        this.targetVy = rand(-0.35, 0.35);
        this.turnTimer = rand(80, 200);
        if (Math.random()<0.1) { this.vx*=-1; this.flip=this.vx<0?-1:1; }
      }
      this.vy = lerp(this.vy, this.targetVy, 0.015);
    }

    this.x += this.vx; this.y += this.vy;
    if (this.x < -this.w) this.x=W+20;
    if (this.x > W+this.w) this.x=-20;
    if (this.y < H*0.04) { this.y=H*0.04; this.vy=Math.abs(this.vy); }
    if (this.y > H*0.74) { this.y=H*0.74; this.vy=-Math.abs(this.vy); }
  }

  draw() {
    const bob = Math.sin(this.bobPhase)*3;
    const img = this.getImage();
    ctx.save();
    ctx.translate(this.x, this.y+bob);
    ctx.scale(this.flip, 1);

    if (img && img.complete) {
      ctx.drawImage(img, -this.w*0.5, -this.h*0.5, this.w, this.h);
    } else {
      // Fallback colored oval
      const hue = (fishKeys.indexOf(this.species) * 60 + 20) % 360;
      ctx.beginPath();
      ctx.ellipse(0, 0, this.w*0.5, this.h*0.35, 0, 0, Math.PI*2);
      ctx.fillStyle = `hsl(${hue}, 70%, 55%)`;
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(-this.w*0.4, 0, this.w*0.25, this.h*0.25, 0, 0, Math.PI*2);
      ctx.fillStyle = `hsl(${hue}, 60%, 45%)`;
      ctx.fill();
    }
    ctx.restore();
  }
}

// ─── Scene Init ──────────────────────────────────────────────────────────────
function initScene() {
  bubbles   = Array.from({length:35},  () => new Bubble());
  planktons = Array.from({length:70},  () => new Plankton());
  fishes    = Array.from({length:7},   () => new Fish());
  pellets   = [];
  initRays();
  initSeaweed();
}

// ─── Interaction ─────────────────────────────────────────────────────────────
function scatterPellets(x, y, n=6) {
  for (let i=0; i<n; i++) pellets.push(new Pellet(x+rand(-20,20), y+rand(-10,10)));
  // Nearest fish chases
  let nearest=null, nd=Infinity;
  fishes.forEach(f => { const d=Math.hypot(f.x-x,f.y-y); if(d<nd){nd=d;nearest=f;} });
  if (nearest && nd<300) { nearest.eating=true; nearest.eatTarget=pellets[pellets.length-1]; }
}

document.getElementById('aquarium').addEventListener('click', e => {
  if (e.target.tagName==='BUTTON') return;
  scatterPellets(e.clientX, e.clientY, 6);
});

document.getElementById('btnFeed').addEventListener('click', () => {
  scatterPellets(rand(W*0.2,W*0.8), rand(H*0.1,H*0.4), 10);
});

document.getElementById('btnMoreFish').addEventListener('click', () => {
  fishes.push(new Fish(rand(W*0.3,W*0.7), rand(H*0.2,H*0.5)));
});

// ─── Main Loop ───────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  time++;
  ctx.clearRect(0, 0, W, H);

  drawRays();
  planktons.forEach(p => { p.update(); p.draw(); });
  bubbles.forEach(b => { b.update(); b.draw(); });
  seaweeds.forEach(sw => drawSeaweed(sw));
  drawDecor();

  pellets.forEach(p => { p.update(); p.draw(); });
  pellets = pellets.filter(p => !p.eaten);

  fishes.forEach(f => { f.update(); f.draw(); });
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
// Start immediately - no loading screen
initScene();
loadAllImages();
loop();
</script>
