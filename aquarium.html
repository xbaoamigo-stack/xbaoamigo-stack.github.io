<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐠 小蝦米水族箱</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a1628;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }
  #aquarium {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(180deg, #0d4f7a 0%, #0a2a4a 35%, #061a30 70%, #030f1e 100%);
    overflow: hidden;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }
  #ui {
    position: absolute;
    bottom: 16px;
    right: 16px;
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  #ui button {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.85);
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    backdrop-filter: blur(6px);
    transition: background 0.2s;
  }
  #ui button:hover { background: rgba(255,255,255,0.25); }
  #hint {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    pointer-events: none;
    z-index: 10;
  }
  #title {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.2);
    font-size: 13px;
    letter-spacing: 3px;
    z-index: 10;
    pointer-events: none;
  }
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.6);
    font-size: 16px;
    z-index: 20;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="aquarium">
  <canvas id="canvas"></canvas>
  <div id="title">🐠 小蝦米水族箱</div>
  <div id="loading"><div class="spinner"></div>魚兒游來中...</div>
  <div id="ui">
    <button id="btnFeed">🫧 餵食</button>
    <button id="btnMoreFish">➕ 更多魚</button>
  </div>
  <div id="hint">點擊水中任意處餵食 · 魚會游過來</div>
</div>

<script>
// ─── Canvas ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initScene(); });

// ─── Utilities ────────────────────────────────────────────────────────────────
const rand = (a, b) => a + Math.random() * (b - a);
const lerp  = (a, b, t) => a + (b - a) * t;
let time = 0;
let loadedCount = 0;
const totalToLoad = 6;

// ─── Real Fish Images ────────────────────────────────────────────────────────
const fishImages = {};
const fishKeys = ['clownfish','blue_tang','betta','discus','angelfish','goldfish'];

function loadImages() {
  const data = __FISH_DATA__;  // injected
  fishKeys.forEach((name, i) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { loadedCount++; checkReady(); };
    img.onerror = () => { loadedCount++; checkReady(); };
    img.src = data[name];
    fishImages[name] = img;
  });
}

function checkReady() {
  if (loadedCount >= totalToLoad) {
    document.getElementById('loading').style.display = 'none';
    initScene();
  }
}

// ─── Background Elements ─────────────────────────────────────────────────────
class Bubble {
  constructor(initY) {
    this._reset();
    if (initY !== undefined) this.y = initY;
  }
  _reset() {
    this.x = rand(0, W);
    this.y = H + rand(5, 60);
    this.r = rand(2, 6);
    this.speed = rand(0.3, 0.9);
    this.wobble = rand(0, Math.PI * 2);
    this.wobbleSpeed = rand(0.01, 0.03);
    this.alpha = rand(0.12, 0.35);
  }
  update() {
    this.y -= this.speed;
    this.wobble += this.wobbleSpeed;
    this.x += Math.sin(this.wobble) * 0.4;
    if (this.y < -20) this._reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 235, 255, ${this.alpha})`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x - this.r * 0.3, this.y - this.r * 0.3, this.r * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,0.22)`;
    ctx.fill();
  }
}

class Plankton {
  constructor() { this.reset(); }
  reset() {
    this.x = rand(0, W);
    this.y = rand(0, H);
    this.r = rand(0.5, 1.5);
    this.alpha = rand(0.05, 0.18);
    this.speedX = rand(-0.12, 0.12);
    this.speedY = rand(-0.06, 0.06);
    this.phase = rand(0, Math.PI * 2);
  }
  update() {
    this.phase += 0.02;
    this.x += this.speedX + Math.sin(this.phase) * 0.15;
    this.y += this.speedY;
    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 230, 200, ${this.alpha})`;
    ctx.fill();
  }
}

// Light rays
let rays = [];
function initRays() {
  rays = Array.from({ length: 7 }, () => ({
    x: W * 0.05 + rand(0, W * 0.9),
    width: rand(40, 100),
    alpha: rand(0.025, 0.065),
    speed: rand(0.0002, 0.0006),
    phase: rand(0, Math.PI * 2)
  }));
}

function drawRays() {
  rays.forEach(r => {
    r.phase += r.speed;
    const drift = Math.sin(r.phase) * 25;
    const grad = ctx.createLinearGradient(r.x + drift, 0, r.x + drift + r.width * 1.5, H * 0.55);
    grad.addColorStop(0, `rgba(160, 225, 255, ${r.alpha})`);
    grad.addColorStop(1, 'rgba(160, 225, 255, 0)');
    ctx.beginPath();
    ctx.moveTo(r.x + drift, 0);
    ctx.lineTo(r.x + drift + r.width * 1.5, H * 0.55);
    ctx.lineTo(r.x + drift + r.width * 1.5 + 15, H * 0.55);
    ctx.lineTo(r.x + drift + 15, 0);
    ctx.fillStyle = grad;
    ctx.fill();
  });
}

// Seaweed
let seaweeds = [];
function initSeaweed() {
  seaweeds = [];
  const count = Math.max(4, Math.floor(W / 110));
  for (let i = 0; i < count; i++) {
    seaweeds.push({
      baseX: 30 + (W - 60) * (i / Math.max(count - 1, 1)) + rand(-25, 25),
      height: rand(70, 160),
      segments: Math.floor(rand(7, 12)),
      phase: rand(0, Math.PI * 2),
      speed: rand(0.007, 0.014),
      color: `hsl(${rand(95, 160)}, ${rand(45, 70)}%, ${rand(22, 38)}%)`,
      width: rand(4, 8)
    });
  }
}

function drawSeaweed(sw) {
  ctx.beginPath();
  ctx.moveTo(sw.baseX, H);
  let x = sw.baseX;
  for (let i = 1; i <= sw.segments; i++) {
    const t = i / sw.segments;
    const wave = Math.sin(time * sw.speed + sw.phase + t * 3) * 14 * t;
    x = sw.baseX + wave;
    const y = H - t * sw.height;
    ctx.lineTo(x, y);
  }
  ctx.strokeStyle = sw.color;
  ctx.lineWidth = sw.width;
  ctx.lineCap = 'round';
  ctx.stroke();
}

// Coral & rocks
function drawDecor() {
  const sy = H - 12;
  // Sand
  const sg = ctx.createLinearGradient(0, H * 0.72, 0, H);
  sg.addColorStop(0, 'rgba(180, 150, 90, 0)');
  sg.addColorStop(0.4, 'rgba(160, 128, 75, 0.25)');
  sg.addColorStop(1, 'rgba(140, 110, 60, 0.45)');
  ctx.fillStyle = sg;
  ctx.fillRect(0, H * 0.70, W, H * 0.30);

  // Rocks
  [{ x: W*.08, w: 75, h: 28, c: '#4a3d2e' },
   { x: W*.25, w: 55, h: 22, c: '#3d3425' },
   { x: W*.70, w: 95, h: 35, c: '#4a3d2e' },
   { x: W*.85, w: 50, h: 24, c: '#3d3425' }].forEach(r => {
    ctx.beginPath();
    ctx.ellipse(r.x, sy - r.h/2, r.w/2, r.h/2, 0, 0, Math.PI*2);
    ctx.fillStyle = r.c;
    ctx.fill();
  });

  // Corals
  [[W*.12, 38, '#e8705a'], [W*.55, 50, '#f4a460'],
   [W*.88, 32, '#e06080'], [W*.40, 28, '#ff9a7a']].forEach(([cx, ch, cc]) => {
    ctx.beginPath();
    ctx.moveTo(cx - 10, sy);
    ctx.quadraticCurveTo(cx - 12, sy - ch, cx, sy - ch - 8);
    ctx.quadraticCurveTo(cx + 12, sy - ch, cx + 10, sy);
    ctx.fillStyle = cc;
    ctx.fill();
    for (let b = 1; b <= 3; b++) {
      ctx.beginPath();
      ctx.moveTo(cx, sy - ch*b/4);
      ctx.quadraticCurveTo(cx + 7*b, sy - ch*b/4 - 8, cx + 4, sy - ch*(b+1)/4 - 4);
      ctx.strokeStyle = cc;
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }
  });
}

// ─── Pellet ───────────────────────────────────────────────────────────────────
class Pellet {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.vy = -2;
    this.vx = rand(-0.5, 0.5);
    this.r = 3.5;
    this.alpha = 1;
    this.eaten = false;
    this.age = 0;
  }
  update() {
    this.age++;
    this.vy += 0.06;
    this.y += this.vy;
    this.x += this.vx + Math.sin(this.y * 0.06) * 0.25;
    if (this.y > H - 25) {
      this.alpha -= 0.04;
      if (this.alpha <= 0) this.eaten = true;
    }
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.alpha);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = '#d4a830';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x - 1, this.y - 1.2, this.r * 0.45, 0, Math.PI * 2);
    ctx.fillStyle = '#ffe880';
    ctx.fill();
    ctx.restore();
  }
}

// ─── RealFish ─────────────────────────────────────────────────────────────────
const FISH_W = 320, FISH_H = 220;  // source image dimensions

class RealFish {
  constructor(x, y, species) {
    this.x = x ?? rand(60, W - 60);
    this.y = y ?? rand(H * 0.12, H * 0.68);
    this.species = species ?? fishKeys[Math.floor(Math.random() * fishKeys.length)];
    this.img = fishImages[this.species];
    this.scale = rand(0.18, 0.35);
    this.speed = rand(0.35, 0.9);
    this.vx = (Math.random() > 0.5 ? 1 : -1) * this.speed;
    this.vy = 0;
    this.targetVy = 0;
    this.turnTimer = rand(60, 200);
    this.flip = this.vx < 0 ? -1 : 1;
    this.bobPhase = rand(0, Math.PI * 2);
    this.tailPhase = rand(0, Math.PI * 2);
    this.eating = false;
    this.eatTarget = null;
    this.w = FISH_W * this.scale;
    this.h = FISH_H * this.scale;
  }

  update() {
    this.turnTimer--;
    this.bobPhase += 0.025;
    this.tailPhase += 0.18;

    // Chase pellet
    if (this.eating && this.eatTarget && !this.eatTarget.eaten) {
      const dx = this.eatTarget.x - this.x;
      const dy = this.eatTarget.y - this.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 25) {
        this.eatTarget.eaten = true;
        this.eating = false;
        this.eatTarget = null;
      } else {
        this.vx = Math.sign(dx) * Math.min(Math.abs(dx) * 0.04, this.speed * 1.8);
        this.vy = dy * 0.04;
        this.flip = dx > 0 ? 1 : -1;
      }
    } else {
      if (this.turnTimer <= 0) {
        this.targetVy = rand(-0.35, 0.35);
        this.turnTimer = rand(80, 200);
        if (Math.random() < 0.1) {
          this.vx *= -1;
          this.flip = this.vx < 0 ? -1 : 1;
        }
      }
      this.vy = lerp(this.vy, this.targetVy, 0.015);
    }

    this.x += this.vx;
    this.y += this.vy;

    if (this.x < -this.w) this.x = W + 20;
    if (this.x > W + this.w) this.x = -20;
    if (this.y < H * 0.04) { this.y = H * 0.04; this.vy = Math.abs(this.vy); }
    if (this.y > H * 0.74) { this.y = H * 0.74; this.vy = -Math.abs(this.vy); }
  }

  draw() {
    const bob = Math.sin(this.bobPhase) * 3;
    const tailWag = Math.sin(this.tailPhase) * 4;

    ctx.save();
    ctx.translate(this.x, this.y + bob);
    ctx.scale(this.flip, 1);

    if (this.img && this.img.complete && this.img.naturalWidth > 0) {
      // Draw fish facing right — image is naturally facing right
      ctx.drawImage(this.img, -this.w * 0.5, -this.h * 0.5, this.w, this.h);
    } else {
      // Fallback colored ellipse
      ctx.beginPath();
      ctx.ellipse(0, 0, this.w * 0.45, this.h * 0.35, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#ff7043';
      ctx.fill();
    }

    // Tail wag overlay (subtle)
    if (tailWag > 1) {
      ctx.save();
      ctx.globalAlpha = 0.15;
      ctx.beginPath();
      ctx.ellipse(-this.w * 0.5, 0, 8, 5, tailWag * 0.05, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.restore();
    }

    ctx.restore();
  }
}

// ─── Scene ───────────────────────────────────────────────────────────────────
let bubbles = [], planktons = [], fishes = [], pellets = [];

function initScene() {
  bubbles   = Array.from({ length: 35 }, () => new Bubble());
  planktons = Array.from({ length: 70 }, () => new Plankton());
  fishes    = Array.from({ length: 7 },  () => new RealFish());
  pellets   = [];
  initRays();
  initSeaweed();
}

function addFish() {
  fishes.push(new RealFish(rand(W * 0.3, W * 0.7), rand(H * 0.2, H * 0.5)));
}

function scatterPellets(x, y, n = 6) {
  for (let i = 0; i < n; i++) {
    pellets.push(new Pellet(x + rand(-20, 20), y + rand(-10, 10)));
  }
}

// ─── Interactions ─────────────────────────────────────────────────────────────
document.getElementById('aquarium').addEventListener('click', e => {
  if (e.target.tagName === 'BUTTON') return;
  scatterPellets(e.clientX, e.clientY, 6);
  // Nearest fish chases
  let nearest = null, nd = Infinity;
  fishes.forEach(f => {
    const d = Math.hypot(f.x - e.clientX, f.y - e.clientY);
    if (d < nd) { nd = d; nearest = f; }
  });
  if (nearest && nd < 300) {
    nearest.eating = true;
    nearest.eatTarget = pellets[pellets.length - 1];
  }
});

document.getElementById('btnFeed').addEventListener('click', () => {
  scatterPellets(rand(W * 0.2, W * 0.8), rand(H * 0.1, H * 0.4), 10);
});

document.getElementById('btnMoreFish').addEventListener('click', addFish);

// ─── Loop ─────────────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  time++;
  ctx.clearRect(0, 0, W, H);

  drawRays();
  planktons.forEach(p => { p.update(); p.draw(); });
  bubbles.forEach(b => { b.update(); b.draw(); });
  seaweeds.forEach(sw => drawSeaweed(sw));
  drawDecor();

  pellets.forEach(p => { p.update(); p.draw(); });
  pellets = pellets.filter(p => !p.eaten);

  fishes.forEach(f => { f.update(); f.draw(); });
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
