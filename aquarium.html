<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐠 小蝦米水族箱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#061a30;height:100vh;overflow:hidden;font-family:system-ui,sans-serif}
canvas{display:block;width:100vw;height:100vh}
#ui{position:fixed;bottom:18px;right:18px;display:flex;gap:10px;z-index:10}
#ui button{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);color:#fff;padding:9px 20px;border-radius:20px;cursor:pointer;font-size:14px;backdrop-filter:blur(6px);transition:background .2s}
#ui button:hover{background:rgba(255,255,255,0.22)}
#hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.28);font-size:12px;z-index:10;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <button id="btnFeed">🫧 餵食</button>
  <button id="btnAddFish">➕ 更多魚</button>
</div>
<div id="hint">點擊水中任意處餵食</div>
<script>
// ─── Canvas Setup ────────────────────────────────────────────────────────────
const C=document.getElementById('c'), X=C.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth*devicePixelRatio; H=C.height=innerHeight*devicePixelRatio; C.style.width=W+'px'; C.style.height=H+'px';}
resize();
window.addEventListener('resize',resize);

// ─── Utilities ───────────────────────────────────────────────────────────────
const rand=(a,b)=>a+Math.random()*(b-a), lerp=(a,b,t)=>a+(b-a)*t;
let t=0;

// ─── Fish species with CSS gradient colors ───────────────────────────────────
const SPECIES=[
  {name:'小丑魚', body:'#ff7043', fin:'#ff8a65', stripe:'#fff', size:1.0},
  {name:'藍吊',   body:'#1976d2', fin:'#42a5f5', stripe:'#fff', size:1.1},
  {name:'神仙魚', body:'#eceff1', fin:'#b0bec5', stripe:'#f48fb1', size:1.2},
  {name:'金魚',   body:'#ff8f00', fin:'#ffb300', stripe:'#ffd54f', size:0.9},
  {name:'鬥魚',   body:'#7b1fa2', fin:'#ce93d8', stripe:'#e040fb', size:0.85},
  {name:'七彩神仙', body:'#00695c', fin:'#26a69a', stripe:'#80cbc4', size:1.15},
];

// ─── Fish Object ─────────────────────────────────────────────────────────────
class Fish{
  constructor(){
    const sp=SPECIES[Math.floor(Math.random()*SPECIES.length)];
    this.sp=sp;
    this.x=rand(0,W); this.y=rand(H*0.1,H*0.7);
    this.vx=(Math.random()>0.5?1:-1)*rand(0.6,1.8);
    this.vy=0; this.targetVy=0;
    this.scale=rand(0.7,1.3)*sp.size;
    this.turnTimer=rand(60,220);
    this.flip=this.vx<0?-1:1;
    this.bob=rand(0,Math.PI*2);
    this.tail=rand(0,Math.PI*2);
    this.wobble=0; this.eating=false; this.eatTarget=null;
  }
  update(){
    this.turnTimer--; this.bob+=0.03; this.tail+=0.22;
    const speed=lerp(this.vx,this.vx*0.98,0.05);
    this.vx=Math.abs(speed)*this.flip;

    if(this.eating&&this.eatTarget&&!this.eatTarget.eaten){
      const dx=this.eatTarget.x-this.x,dy=this.eatTarget.y-this.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<30){this.eatTarget.eaten=true;this.eating=false;this.eatTarget=null;}
      else{this.vx=Math.sign(dx)*Math.min(Math.abs(dx)*0.05,2);this.vy=dy*0.05;this.flip=dx>0?1:-1;}
    } else {
      if(this.turnTimer<=0){
        this.targetVy=rand(-1.2,1.2);
        this.turnTimer=rand(80,220);
        if(Math.random()<0.08){this.vx*=-1;this.flip=this.vx<0?-1:1;}
      }
      this.vy=lerp(this.vy,this.targetVy,0.02);
    }
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<-120)this.x=W+60;
    if(this.x>W+120)this.x=-60;
    if(this.y<H*0.06){this.y=H*0.06;this.vy=Math.abs(this.vy);}
    if(this.y>H*0.76){this.y=H*0.76;this.vy=-Math.abs(this.vy);}
  }
  draw(){
    const bob=Math.sin(this.bob)*4;
    const tailWag=Math.sin(this.tail)*6;
    const s=this.scale;
    X.save();
    X.translate(this.x,this.y+bob);
    X.scale(this.flip,1);

    // Tail
    X.save();
    X.globalAlpha=0.7;
    X.fillStyle=this.sp.fin;
    X.beginPath();
    X.moveTo(-50*s,0);
    X.quadraticCurveTo(-55*s,-18*s+tailWag,-70*s,-22*s+tailWag);
    X.quadraticCurveTo(-55*s,0,-70*s,22*s+tailWag);
    X.quadraticCurveTo(-55*s,18*s+tailWag,-50*s,0);
    X.fill();
    X.restore();

    // Body
    X.fillStyle=this.sp.body;
    X.beginPath();
    X.ellipse(0,0,50*s,30*s,0,0,Math.PI*2);
    X.fill();

    // Dorsal fin
    X.fillStyle=this.sp.fin;
    X.beginPath();
    X.moveTo(-10*s,-28*s);
    X.quadraticCurveTo(0,-45*s,15*s,-28*s);
    X.fill();

    // Pectoral fin
    X.globalAlpha=0.7;
    X.fillStyle=this.sp.fin;
    X.beginPath();
    X.ellipse(5*s,18*s,18*s,10*s,0.4,0,Math.PI*2);
    X.fill();
    X.globalAlpha=1;

    // Stripe
    X.fillStyle=this.sp.stripe;
    X.globalAlpha=0.55;
    X.beginPath();
    X.ellipse(0,0,10*s,28*s,0,0,Math.PI*2);
    X.fill();
    X.globalAlpha=1;

    // Eye
    X.fillStyle='#fff';
    X.beginPath(); X.arc(28*s,5*s,10*s,0,Math.PI*2); X.fill();
    X.fillStyle='#1a1a1a';
    X.beginPath(); X.arc(30*s,4*s,5*s,0,Math.PI*2); X.fill();
    X.fillStyle='#fff';
    X.beginPath(); X.arc(31*s,3*s,2*s,0,Math.PI*2); X.fill();

    X.restore();
  }
}

// ─── Bubble ──────────────────────────────────────────────────────────────────
class Bubble{
  constructor(initY){this._reset();if(initY!==undefined)this.y=initY;}
  _reset(){this.x=rand(0,W);this.y=H+rand(5,60);this.r=rand(2,5);this.speed=rand(0.3,0.9);this.wob=rand(0,Math.PI*2);this.wobSpeed=rand(0.01,0.03);this.alpha=rand(0.1,0.3);}
  update(){this.y-=this.speed;this.wob+=this.wobSpeed;this.x+=Math.sin(this.wob)*0.4;if(this.y<-20)this._reset();}
  draw(){
    X.beginPath();X.arc(this.x,this.y,this.r,0,Math.PI*2);
    X.fillStyle=`rgba(200,235,255,${this.alpha})`;X.fill();
    X.beginPath();X.arc(this.x-this.r*0.3,this.y-this.r*0.3,this.r*0.35,0,Math.PI*2);
    X.fillStyle='rgba(255,255,255,0.2)';X.fill();
  }
}

// ─── Pellet ─────────────────────────────────────────────────────────────────
class Pellet{
  constructor(x,y){this.x=x;this.y=y;this.vy=-2.5;this.vx=rand(-0.5,0.5);this.r=4;this.alpha=1;this.eaten=false;this.age=0;}
  update(){
    this.age++;this.vy+=0.07;this.y+=this.vy;this.x+=this.vx+Math.sin(this.y*0.05)*0.3;
    if(this.y>H-30){this.alpha-=0.04;if(this.alpha<=0)this.eaten=true;}
  }
  draw(){
    X.save();X.globalAlpha=Math.max(0,this.alpha);
    X.beginPath();X.arc(this.x,this.y,this.r,0,Math.PI*2);
    X.fillStyle='#d4a830';X.fill();
    X.beginPath();X.arc(this.x-1,this.y-1.2,this.r*0.45,0,Math.PI*2);
    X.fillStyle='#ffe880';X.fill();
    X.restore();
  }
}

// ─── Scene ──────────────────────────────────────────────────────────────────
const bubbles=Array.from({length:40},()=>new Bubble()), pellets=[];
let fishes=SPECIES.map(()=>new Fish());

// ─── Background ─────────────────────────────────────────────────────────────
function drawBG(){
  // Ocean gradient
  const g=X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d4f7a');g.addColorStop(0.35,'#0a2a4a');g.addColorStop(0.7,'#061a30');g.addColorStop(1,'#030f1e');
  X.fillStyle=g;X.fillRect(0,0,W,H);

  // Light rays
  for(let i=0;i<7;i++){
    const rx=W*(0.05+i*0.13)+Math.sin(t*0.001+i)*25;
    const rg=X.createLinearGradient(rx,0,rx+W*0.15,H*0.55);
    rg.addColorStop(0,'rgba(160,225,255,0.04)');rg.addColorStop(1,'rgba(160,225,255,0)');
    X.beginPath();X.moveTo(rx,0);X.lineTo(rx+W*0.15,H*0.55);X.lineTo(rx+W*0.15+10,H*0.55);X.lineTo(rx+10,0);
    X.fillStyle=rg;X.fill();
  }

  // Sand
  const sg=X.createLinearGradient(0,H*0.72,0,H);
  sg.addColorStop(0,'rgba(180,150,90,0)');sg.addColorStop(0.4,'rgba(160,128,75,0.3)');sg.addColorStop(1,'rgba(140,110,60,0.5)');
  X.fillStyle=sg;X.fillRect(0,H*0.70,W,H*0.30);

  // Rocks
  [{x:0.08,w:80,h:30,c:'#4a3d2e'},{x:0.25,w:60,h:24,c:'#3d3425'},{x:0.72,w:100,h:38,c:'#4a3d2e'},{x:0.88,w:55,h:26,c:'#3d3425'}].forEach(r=>{
    X.beginPath();X.ellipse(W*r.x,H-15-r.h/2,r.w/2,r.h/2,0,0,Math.PI*2);
    X.fillStyle=r.c;X.fill();
  });

  // Seaweed
  const swBaseX=[W*0.1,W*0.22,W*0.5,W*0.65,W*0.85];
  swBaseX.forEach((bx,i)=>{
    const sh=rand(60,140), seg=Math.floor(rand(7,12));
    X.beginPath();X.moveTo(bx,H);
    let x=bx;
    for(let j=1;j<=seg;j++){
      const tt=j/seg, wave=Math.sin(t*0.008+i*0.7+tt*3)*14*tt;
      x=bx+wave;X.lineTo(x,H-tt*sh);
    }
    X.strokeStyle=`hsl(${rand(95,155)},${rand(50,70)}%,${rand(22,38)}%)`;
    X.lineWidth=rand(4,8);X.lineCap='round';X.stroke();
  });

  // Coral
  [[0.12,40,'#e8705a'],[0.55,52,'#f4a460'],[0.88,34,'#e06080'],[0.40,30,'#ff9a7a']].forEach(([cx,ch,cc])=>{
    X.beginPath();X.moveTo(W*cx-12,H-15);
    X.quadraticCurveTo(W*cx-14,H-15-ch,W*cx,H-15-ch-8);
    X.quadraticCurveTo(W*cx+14,H-15-ch,W*cx+12,H-15);
    X.fillStyle=cc;X.fill();
    for(let b=1;b<=3;b++){
      X.beginPath();X.moveTo(W*cx,H-15-ch*b/4);
      X.quadraticCurveTo(W*cx+8*b,H-15-ch*b/4-8,W*cx+5,H-15-ch*(b+1)/4-4);
      X.strokeStyle=cc;X.lineWidth=2.5;X.stroke();
    }
  });
}

// ─── Interaction ─────────────────────────────────────────────────────────────
function scatterPellets(x,y,n=8){
  for(let i=0;i<n;i++) pellets.push(new Pellet(x+rand(-20,20),y+rand(-10,10)));
  let nearest=null,nd=Infinity;
  fishes.forEach(f=>{const d=Math.hypot(f.x-x,f.y-y);if(d<nd){nd=d;nearest=f;}});
  if(nearest&&nd<350){nearest.eating=true;nearest.eatTarget=pellets[pellets.length-1];}
}
document.addEventListener('click',e=>{if(e.target.tagName!=='BUTTON')scatterPellets(e.clientX*devicePixelRatio,e.clientY*devicePixelRatio);});
document.getElementById('btnFeed').onclick=()=>scatterPellets(rand(W*0.2,W*0.8),rand(H*0.1,H*0.5),12);
document.getElementById('btnAddFish').onclick=()=>fishes.push(new Fish());

// ─── Loop ────────────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  t++;
  X.clearRect(0,0,W,H);
  drawBG();
  bubbles.forEach(b=>{b.update();b.draw();});
  pellets.forEach(p=>{p.update();p.draw();});
  pellets=pellets.filter(p=>!p.eaten);
  fishes.forEach(f=>{f.update();f.draw();});
}
loop();
</script>
</body>
</html>
